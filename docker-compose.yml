services:
  server:
    container_name: streamvault-server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3001"
    volumes:
      - streamvault_data:/app/data
      - streamvault_recordings:/app/data/recordings
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped

volumes:
  streamvault_data:
  streamvault_recordings:
