name: Build & Sign WGT

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TIZEN_STUDIO_VER: "4.5.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Install Tizen Studio CLI
        run: |
          curl -o tizen-installer "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"
          chmod +x tizen-installer
          ./tizen-installer --accept-license "$HOME/tizen-studio"
          rm tizen-installer

      - name: Create Tizen certificate and profile
        run: |
          TIZEN="$HOME/tizen-studio/tools/ide/bin/tizen"

          $TIZEN certificate \
            -a StreamVault -p 1234 -c SE -ct Stockholm -o StreamVault -n StreamVault \
            -e streamvault@dev.local -f streamvault

          $TIZEN security-profiles add \
            -n StreamVault \
            -a "$HOME/tizen-studio-data/keystore/author/streamvault.p12" \
            -p 1234

          $TIZEN cli-config "profiles.path=$HOME/tizen-studio-data/profile/profiles.xml"

          # Embed passwords directly in profiles.xml so tizen package doesn't prompt
          PROFILES="$HOME/tizen-studio-data/profile/profiles.xml"
          cat "$PROFILES"

          # Replace author cert password file path with actual password
          sed -i "s|$HOME/tizen-studio-data/keystore/author/streamvault.pwd|1234|g" "$PROFILES"
          # Replace distributor cert password file path with actual password
          sed -i "s|$HOME/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd|tizenpkcs12passfordsigner|g" "$PROFILES"
          # Fill in any empty password fields for the distributor
          sed -i 's|password=""|password="tizenpkcs12passfordsigner"|g' "$PROFILES"
          chmod 755 "$PROFILES"

          echo "--- Updated profiles.xml ---"
          cat "$PROFILES"

      - name: Build web app
        working-directory: dist
        run: |
          $HOME/tizen-studio/tools/ide/bin/tizen build-web \
            -e ".*" -e "node_modules/*" -e "*.map"

      - name: Package signed WGT
        working-directory: dist
        run: |
          cat > /tmp/package.exp << 'EXPECT'
          set timeout 30
          spawn $env(HOME)/tizen-studio/tools/ide/bin/tizen package -t wgt -s StreamVault -- [pwd]/.buildResult
          expect {
            "password:" { send "1234\r"; exp_continue }
            "Password:" { send "1234\r"; exp_continue }
            eof
          }
          lassign [wait] pid spawnid os_error value
          exit $value
          EXPECT
          expect /tmp/package.exp

      - name: Collect WGT
        run: |
          find . -name "*.wgt" -type f | head -5
          find . -name "*.wgt" -type f -exec cp {} StreamVault.wgt \;
          ls -la StreamVault.wgt

      - name: Print logs on failure
        if: failure()
        run: cat "$HOME/tizen-studio-data/cli/logs/cli.log" 2>/dev/null || echo "No log file"

      - name: Upload signed WGT
        uses: actions/upload-artifact@v4
        with:
          name: StreamVault-signed
          path: StreamVault.wgt
          retention-days: 30
