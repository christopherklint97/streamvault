name: Build & Sign WGT

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install cert tools
        run: npm install @tizentv/tools @tizentv/webide-common-tizentv node-forge

      - name: Generate Samsung certificates
        env:
          SAMSUNG_ACCESS_TOKEN: ${{ secrets.SAMSUNG_ACCESS_TOKEN }}
          SAMSUNG_USER_ID: ${{ secrets.SAMSUNG_USER_ID }}
          TV_DUID: ${{ secrets.TV_DUID }}
        run: node scripts/generate-samsung-cert.cjs

      - name: Sign WGT package
        run: |
          # Use the generated Samsung certs to create a profiles.xml
          # then sign and package the dist directory
          node scripts/sign-wgt.cjs

      - name: Upload signed WGT
        uses: actions/upload-artifact@v4
        with:
          name: StreamVault-signed
          path: StreamVault.wgt
          retention-days: 30
